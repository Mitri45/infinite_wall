name: Linux release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
          run_install: false
      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify tagged source
        run: pnpm verify
      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node --print 'require(\"./package.json\").version')" = "$GITHUB_REF_NAME"
      - name: Build Linux installers
        run: pnpm make -- --platform linux --arch x64
      - name: Create checksums
        shell: bash
        run: |
          find out/make -type f \( -name '*.deb' -o -name '*.zip' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                sha256sum "$file" | sed "s|  .*|  ${file##*/}|"
              done > out/make/SHA256SUMS.txt
      - name: Publish GitHub release assets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const tag = context.ref.replace('refs/tags/', '');
            const files = [];
            const visit = (directory) => {
              for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
                const target = path.join(directory, entry.name);
                if (entry.isDirectory()) visit(target);
                else if (/\.(deb|zip)$/.test(entry.name) || entry.name === 'SHA256SUMS.txt') files.push(target);
              }
            };
            visit('out/make');
            if (files.length < 3) throw new Error('Expected .deb, .zip, and checksum release assets.');
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              }));
            } catch (error) {
              if (error.status !== 404) throw error;
              ({ data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Infinite Wall ${tag}`,
                generate_release_notes: true,
                draft: false,
                prerelease: tag.includes('-'),
              }));
            }
            for (const file of files) {
              const name = path.basename(file);
              const existing = release.assets.find((asset) => asset.name === name);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(file),
              });
            }
