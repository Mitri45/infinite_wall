name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
          run_install: false
      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run verification suite
        run: pnpm verify
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  package:
    name: Package ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            label: Linux
          - os: macos-latest
            platform: darwin
            label: macOS
          - os: windows-latest
            platform: win32
            label: Windows
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
          run_install: false
      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run platform verification
        run: pnpm verify
      - name: Build installers
        run: pnpm make -- --platform ${{ matrix.platform }} --arch x64
      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: infinite-wall-${{ matrix.platform }}-x64
          path: out/make/**
          if-no-files-found: error
          retention-days: 14
